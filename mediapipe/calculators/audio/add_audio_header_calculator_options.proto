syntax = "proto3";

package mediapipe;

option java_multiple_files = true;
option java_outer_classname = "AddAudioHeaderCalculatorOptionsOuterClass";

message AddAudioHeaderCalculatorOptions {
  // Sample rate of the audio stream. Defaults to 48000.0 if left at 0.
  double sample_rate = 1;
  // Number of channels in the audio stream. Defaults to 1 if left at 0.
  int32 num_channels = 2;
}
