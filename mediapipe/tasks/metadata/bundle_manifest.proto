syntax = "proto3";

package mediapipe.tasks;

option java_package = "com.google.mediapipe.tasks";
option java_outer_classname = "Manifest";
option java_multiple_files = true;

// Manifest for *.task bundles used in MediaPipe Tasks.
message BundleManifest {
  // The publisher of the model (e.g., "Google LLC").
  string publisher = 1;

  // The unique identifier of the bundle (e.g., "blaze_face_full_range").
  string bundle_id = 2;

  // The license of the model (e.g., "Apache 2.0").
  string license = 3;
}
